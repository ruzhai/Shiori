<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shiori</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      33%  { opacity: 0.3; transform: scale(1.3); }
      66%  { opacity: 0.6; transform: scale(1.05); }
    }

    /* Markdown rendered content */
    .markdown-content p { margin: 4px 0; }
    .markdown-content pre {
      background: #1a1a1a;
      border: 1px solid #3e3e3e;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.5;
    }
    .markdown-content code {
      background: #1a1a1a;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
    }
    .markdown-content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }
    .markdown-content ul, .markdown-content ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .markdown-content a {
      color: #64b5f6;
    }
    .markdown-content strong {
      color: #fff;
    }
    .markdown-content table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 12px;
    }
    .markdown-content th, .markdown-content td {
      border: 1px solid #3e3e3e;
      padding: 6px 10px;
      text-align: left;
    }
    .markdown-content th {
      background: #1a1a1a;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="vendor/marked.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
